<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link rel="icon" href="assets/icon/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="assets/icon/apple-touch-icon.png">
    <script
        defer
        crossorigin="anonymous"
        src="https://clerk.gxweb.top/npm/@clerk/ui@1/dist/ui.browser.js"
        type="text/javascript">
    </script>
    <script
        defer
        crossorigin="anonymous"
        data-clerk-publishable-key="pk_live_Y2xlcmsuZ3h3ZWIudG9wJA"
        src="https://clerk.gxweb.top/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
        type="text/javascript">
    </script>
</head>    
<main>
    <div id="clerk-auth-container">
        <p style = "text-align: center; margin-top: 50px; color: #666;">Loading...</p>
    </div>
    <section>    
        <script>
            // 等待 Clerk 加载完成
            window.addEventListener("load", async () => {
                await Clerk.load();

                // 获取 URL 中的 redirect_url 参数
                const params = new URLSearchParams(window.location.search);
                const redirectUrl = params.get("redirect_url") || "/";

                // 如果用户已登录，直接跳转
                if (Clerk.user) {
                    window.location.href = redirectUrl;
                    return;
                }

                // 如果未登录，挂载 Clerk 登录组件
                Clerk.mountSignIn("#clerk-auth-container", {
                    // 登录成功后的跳转
                    afterSignInUrl: redirectUrl,
                    // 注册成功后的跳转（可选但建议一致）
                    afterSignUpUrl: redirectUrl
                });
            });
        </script>
    </section>
</main>
</html>
