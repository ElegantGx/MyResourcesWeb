<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link rel="icon" href="/assets/login/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/assets/login/apple-touch-icon.png">
    <link rel="stylesheet" href="main.css">
</head>    
<div id="app"></div>

<script
  defer
  crossorigin="anonymous"
  src="https://clerk.gxweb.top/npm/@clerk/ui@1/dist/ui.browser.js"
  type="text/javascript">
</script>

<script
  defer
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_live_Y2xlcmsuZ3h3ZWIudG9wJA"
  src="https://clerk.gxweb.top/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
  type="text/javascript">
</script>

<script>
  window.addEventListener('load', async function () {
    await Clerk.load({
      ui: { ClerkUI: window.__internal_ClerkUICtor },
    })
    if (Clerk.isSignedIn) {
      document.getElementById('app').innerHTML = `
        <div id="loadingPage">
          <img src="/assets/login/loader.svg">
          <p>Loading<span class="dots"></span></p>
        </div>
      `
      const urlParams = new URLSearchParams(window.location.search);
      const redirectUrl = urlParams.get('redirect_url') || '/';
      setTimeout(() => {
        window.location.href = decodeURIComponent(redirectUrl);
      }, 15000000000000);
    } 
    else {
      document.getElementById('app').innerHTML = `
        <div id="sign-in"></div>
      `
      const signInDiv = document.getElementById('sign-in')
      Clerk.mountSignIn(signInDiv)
    }
  })
</script>
</html>
