<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link rel="icon" href="assets/icon/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="assets/icon/apple-touch-icon.png">
</head>    
<div id="app"></div>

<script
  defer
  crossorigin="anonymous"
  src="https://clerk.gxweb.top/npm/@clerk/ui@1/dist/ui.browser.js"
  type="text/javascript">
</script>

<script
  defer
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_live_Y2xlcmsuZ3h3ZWIudG9wJA"
  src="https://clerk.gxweb.top/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
  type="text/javascript">
</script>

<script>
  window.addEventListener('load', async function () {
    await Clerk.load({
      ui: { ClerkUI: window.__internal_ClerkUICtor },
    })

    if (Clerk.isSignedIn) {
      document.getElementById('app').innerHTML = `
        <div id="user-button"></div>
      `

      const userButtonDiv = document.getElementById('user-button')

      Clerk.mountUserButton(userButtonDiv)
    } else {
      document.getElementById('app').innerHTML = `
        <div id="sign-in"></div>
      `

      const signInDiv = document.getElementById('sign-in')

      Clerk.mountSignIn(signInDiv)
    }
  })
</script>
</main>
</html>
