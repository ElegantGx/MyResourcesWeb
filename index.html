<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Our Resources</title>
    <link rel="icon" href="assets/icon/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="assets/icon/apple-touch-icon.png">
    <link rel="stylesheet" href="CSS/main.css">
    <script id="clerk-init" async crossorigin="anonymous"></script>

<script>
    window.addEventListener('load', async () => {
        // 持续检查 Clerk SDK 是否被 Worker 成功注入并加载
        const checkClerk = setInterval(async () => {
            if (window.Clerk) {
                clearInterval(checkClerk);
                try {
                    await Clerk.load();
                    
                    // 核心步骤：一旦检测到 URL 带着认证尾巴，立即清理并重写历史记录
                    if (window.location.search.includes('__clerk_db_jwt')) {
                        // 强制浏览器将当前 URL 修正为干净的根路径
                        const cleanUrl = window.location.origin + window.location.pathname;
                        window.history.replaceState({}, document.title, cleanUrl);
                        console.log("认证同步完成，正在还原标准 HTML 视图...");
                    }
                } catch (err) {
                    console.error("Clerk 初始化失败:", err);
                }
            }
        }, 100);
    });
</script>
</head>
<body>
    <main class="container">
        <aside class="file-tree">
            <header class="filetree-header">
                <div class="logo">
                    <img src="assets/images/Logo.png">
                </div>
                <div class="refresh">
                    <img src="assets/icon/filesIcon/refresh-cw.svg"> 
                </div>
            </header>
            <section class="filetree-main">
                <div class="filetree-about">
                    <ul>
                        <li class="menu-item"><a href="https://elegantgx.github.io"><img src="assets/icon/filesIcon/contact-round.svg">个人网站</a></li>
                        <li class="menu-item"><a href="https://github.com/ElegantGx/MyResourcesWeb"><img src="assets/icon/filesIcon/github.png" class="github-logo">Github仓库</a></li>
                        <li class="menu-item"><a href="pages/about.html"><img src="assets/icon/filesIcon/info.svg">关于</a></li>
                    </ul>
                </div>
                <div class="filetree-tree">
                    <p>资源浏览</p>
                    <ul>
                        <li class="menu-item" data-type="anime">动漫</li>
                        <li class="menu-item" data-type="diyimages">DIY图片</li>
                        <li class="menu-item" data-type="pcmaintencetools">电脑管理</li>
                        <li class="menu-item" data-type="anime">测试</li>
                        <li class="menu-item" data-type="anime">滚动条</li>
                        <li class="menu-item" data-type="anime">功能</li>
                        <li class="menu-item" data-type="anime">成功</li>
                    </ul>
                </div>
            </section>
            <footer class="filetree-footer">
                <div class="label"></div>
                <div class="web-name">
                    <h1>Our Resources</h1>
                </div>
            </footer>
        </aside>
        <section class="file-view">
            <header class="filename-view">
                <div class="filename-show">
                    <p>home</p>
                </div>
                <div class="filename-search">
                    <div class="search-container">
                        <input type="text" placeholder="搜索" id="fileSearch">
                    </div>
                </div>
            </header>
            <div class="gui">
                <div class="file-gui">
                    <div class="file-item">
                        <img src="assets/icon/filesIcon/folder-closed.svg">
                        <span>动漫</span>
                    </div>
                    <div class="file-item">
                        <img src="assets/icon/filesIcon/film.svg">
                        <span>动漫</span>
                    </div>
                </div>
                <div class="download-gui">
                    <img src="assets/icon/filesIcon/download.svg">
                    <p>点击下载</p>
                </div>
            </div>    
            <footer class="filepath-view">
                <div class="filepath-main">
                    <p id="breadcrumb-path">
                        <span>
                            <img src="assets/icon/filesIcon/hard-drive.svg">'/
                        </span>
                        >
                        <span>
                            <img src="assets/icon/filesIcon/folder-open.svg">动漫
                        </span>
                    </p>
                </div>                
            </footer>
        </section>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
