<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Our Resources</title>
    <link rel="icon" href="assets/icon/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="assets/icon/apple-touch-icon.png">
    <link rel="stylesheet" href="CSS/main.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    <script
        defer
        crossorigin="anonymous"
        src="https://clerk.gxweb.top/npm/@clerk/ui@1/dist/ui.browser.js"
        type="text/javascript">
    </script>
    <script
        defer
        crossorigin="anonymous"
        data-clerk-publishable-key="pk_live_Y2xlcmsuZ3h3ZWIudG9wJA"
        src="https://clerk.gxweb.top/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
        type="text/javascript">
    </script>
</head>
<body>
    <script type="module" src="js/main.js"></script>
    <main class="container"  v-cloak>
        <aside class="file-tree">
            <header class="filetree-header">
                <div class="logo">
                    <img src="assets/images/Logo.png">
                </div>
                <div class="refresh">
                    <img src="assets/icon/filesIcon/refresh-cw.svg"> 
                </div>
            </header>
            <section class="filetree-main">
                <div class="filetree-about">
                    <ul>
                        <li class="menu-item"><a href="https://elegantgx.github.io"><img src="assets/icon/filesIcon/contact-round.svg">个人网站</a></li>
                        <li class="menu-item"><a href="https://github.com/ElegantGx/MyResourcesWeb"><img src="assets/icon/otherIcon/github.png" class="github-logo">Github仓库</a></li>
                        <li class="menu-item"><a href="pages/about.html"><img src="assets/icon/filesIcon/info.svg">关于</a></li>
                    </ul>
                </div>
                <div class="filetree-tree">
                    <p>资源浏览</p>
                    <ul>
                        <li 
                            v-for="theFolder in theFolders" 
                            :key="theFolder.key"
                            :class="['menu-item', { selected: currentPath === theFolder.key }]"
                            @click="gotoFolder(theFolder.key)"
                        >
                            {{ theFolder.name }}
                        </li>
                    </ul>
                </div>
            </section>
            <footer class="filetree-footer">
                <div class="label"></div>
                <div class="web-name">
                    <h1>Our Resources</h1>
                </div>
            </footer>
        </aside>
        <section class="file-view">
            <header class="filename-view">
                <div class="filename-show">
                    <p>{{ currentPath ? currentPath : 'Home' }}</p>
                </div>
                <div class="filename-search">
                    <div class="search-container">
                        <input type="text" placeholder="搜索" id="fileSearch">
                    </div>
                </div>
            </header>
            <div class="gui">
                <div class="file-gui">
                    <div 
                        v-for="theFile in theFiles" 
                        :key="theFile.path"
                        :class="file-item"
                        @click="getFileList(theFile.path)"
                    >
                        <img :src="theFile.key.endsWith('/') ? 'assets/icon/filesIcon/folder-closed.svg' : 'assets/icon/filesIcon/film.svg'">
                        <span>{{ getFileName(theFile.key) }}</span>
                    </div>
                </div>
                <div class="download-gui">
                    <img src="assets/icon/filesIcon/download.svg">
                    <p>点击下载</p>
                </div>
            </div>    
            <footer class="filepath-view">
                <div class="filepath-main">
                    <p id="breadcrumb-path">
                        <template v-for="(thePath, index) in thePaths" :key="thePath.path">
                            <span @click="gotoPath(thePath.path)">
                                <img :src="index === 0 ? 'assets/icon/filesIcon/hard-drive.svg' : 'assets/icon/filesIcon/folder-open.svg'">
                                {{ thePath.last }}
                            </span>
                            <span v-if="index < thePaths.length - 1"> > </span>
                        </template>
                    </p>
                </div>                
            </footer>
        </section>
    </main>
</body>
</html>
